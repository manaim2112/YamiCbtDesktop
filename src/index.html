<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CBT Launcher</title>
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>

    <!-- Update banner (hidden by default) -->
    <div class="update-banner" id="update-banner" hidden>
      <span class="update-text" id="update-text"></span>
      <button class="update-btn" id="update-btn" hidden>Pasang &amp; Restart</button>
    </div>

    <div class="card">

      <!-- Brand hero -->
      <div class="brand-hero">
        <!-- Logo: replaced with <img> by renderer if APP_LOGO is set -->
        <div class="brand-logo" id="brand-logo">
          <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect width="40" height="40" rx="10" fill="url(#lg)"/>
            <path d="M10 14h20M10 20h14M10 26h8" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
            <circle cx="30" cy="26" r="5" fill="#fff" fill-opacity="0.15" stroke="#fff" stroke-width="1.5"/>
            <path d="M28 26l1.5 1.5L32 24" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            <defs>
              <linearGradient id="lg" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
                <stop stop-color="#6366f1"/>
                <stop offset="1" stop-color="#4f46e5"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <div class="brand-text">
          <span class="brand-name" id="brand-name">Yamitra.com</span>
          <span class="brand-tagline" id="brand-tagline">Management a SaaS Application</span>
        </div>
        <span class="app-version" id="app-version"></span>
      </div>

      <!-- Device spec strip -->
      <div class="spec-strip">
        <div class="spec-item">
          <span class="spec-label">OS</span>
          <span class="spec-value" id="spec-os">—</span>
        </div>
        <div class="spec-divider"></div>
        <div class="spec-item">
          <span class="spec-label">CPU</span>
          <span class="spec-value" id="spec-cpu">—</span>
        </div>
        <div class="spec-divider"></div>
        <div class="spec-item">
          <span class="spec-label">RAM</span>
          <span class="spec-value" id="spec-ram">—</span>
        </div>
        <div class="spec-divider"></div>
        <div class="spec-item">
          <span class="spec-label">Arch</span>
          <span class="spec-value" id="spec-arch">—</span>
        </div>
      </div>

      <!-- Validation checks -->
      <ul class="checks" role="list">
        <li class="check-item" id="check-internet">
          <div class="check-left">
            <div class="check-dot"></div>
            <div class="check-info">
              <span class="check-label">Internet</span>
              <span class="check-msg">Memeriksa...</span>
            </div>
          </div>
          <div class="check-badge">
            <svg class="icon-spin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
            </svg>
          </div>
        </li>

        <li class="check-item" id="check-camera">
          <div class="check-left">
            <div class="check-dot"></div>
            <div class="check-info">
              <span class="check-label">Kamera</span>
              <span class="check-msg">Memeriksa...</span>
            </div>
          </div>
          <div class="check-badge">
            <svg class="icon-spin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
            </svg>
          </div>
        </li>

        <li class="check-item" id="check-hardware">
          <div class="check-left">
            <div class="check-dot"></div>
            <div class="check-info">
              <span class="check-label">RAM</span>
              <span class="check-msg">Memeriksa...</span>
            </div>
          </div>
          <div class="check-badge">
            <svg class="icon-spin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
            </svg>
          </div>
        </li>
      </ul>

      <!-- Camera selector (shown after enumeration) -->
      <div class="camera-row" id="camera-select-wrap" hidden>
        <svg class="cam-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2"/>
        </svg>
        <div class="select-wrapper">
          <select class="camera-select" id="camera-select"></select>
          <svg class="select-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </div>
        <!-- Live preview thumbnail -->
        <div class="cam-thumb-wrap">
          <video class="cam-thumb" id="camera-preview" autoplay muted playsinline></video>
          <div class="cam-thumb-placeholder" id="cam-thumb-placeholder">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2"/>
            </svg>
          </div>
        </div>
      </div>

      <p class="note" id="validation-note" hidden>
        Perbaiki masalah di atas sebelum memulai ujian.
      </p>

      <button class="btn-start" id="btn-start" disabled>
        Mulai Ujian
      </button>

    </div>

    <script src="renderer.js"></script>
  </body>
</html>
